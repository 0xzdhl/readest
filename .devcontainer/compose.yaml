# Devcontainer compose. Includes the infra services from
# docker/compose.dev.yaml and adds an `app` container that VSCode attaches
# to via .devcontainer/devcontainer.json.

name: readest-devcontainer

include:
  - ../docker/compose.dev.yaml

services:
  app:
    container_name: readest-devcontainer-app
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    command: sleep infinity
    user: node
    volumes:
      # The whole repo is bind-mounted so edits land on the host.
      - ..:/workspaces/readest:cached
      # Named volumes for node_modules + pnpm store so installs persist
      # and aren't shadowed by the host bind mount.
      - app-node-modules:/workspaces/readest/node_modules
      - app-readest-node-modules:/workspaces/readest/apps/readest-app/node_modules
      - app-pnpm-store:/home/node/.local/share/pnpm
    environment:
      # In-cluster service names — db / minio / mailpit resolve via the
      # compose network. Override BETTER_AUTH_SECRET in dev shell if needed.
      DATABASE_URL: postgres://readest_app:readest_app@db:5432/${POSTGRES_DB:-postgres}
      BETTER_AUTH_SECRET: dev-secret-replace-me-with-openssl-rand-hex-32
      BETTER_AUTH_URL: http://localhost:5173
      VITE_BETTER_AUTH_URL: http://localhost:5173
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-readest-files}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin-secret-password}
      RESEND_API_KEY: ""
      RESEND_FROM_EMAIL: noreply@readest.app
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    depends_on:
      db:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

volumes:
  app-node-modules:
  app-readest-node-modules:
  app-pnpm-store:
