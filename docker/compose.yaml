name: readest

# Self-host stack for the better-auth / drizzle / MinIO build of readest.
#
# Phase 8 of the supabase → better-auth migration stripped the supabase-
# specific services (gotrue/auth, postgrest/rest, kong gateway, studio and
# meta). better-auth runs inside the readest app process itself, the drizzle
# client talks directly to Postgres, and there is no longer a separate
# read-only REST layer to gate behind a gateway.
#
# What stays:
#   - db      : vanilla Postgres 16. Bootstrapped on first start by
#               ./volumes/db/init/00_init_roles.sql which creates the
#               `readest_app` LOGIN role drizzle migrations later grant on.
#   - minio   : S3-compatible storage for book uploads / replicas.
#   - mailpit : dev-only SMTP catcher so better-auth verification / magic-
#               link emails are inspectable in a browser at :8025 without
#               needing a real SMTP provider.
#   - client  : the readest app itself.

services:
  db:
    container_name: readest-db
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - ./volumes/db/init:/docker-entrypoint-initdb.d:Z
      - db-data:/var/lib/postgresql/data:Z
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    container_name: readest-minio
    image: minio/minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server --console-address ":9001" /data
    volumes:
      - minio-data:/data:z
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing myminio/${S3_BUCKET_NAME}
      "

  mailpit:
    container_name: readest-mailpit
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  client:
    container_name: readest-client
    build:
      context: ..
      target: production-stage
      args:
        VITE_APP_PLATFORM: web
        VITE_BETTER_AUTH_URL: ${BETTER_AUTH_URL}
        NEXT_PUBLIC_API_BASE_URL: http://${HOST_IP}:3000
        NEXT_PUBLIC_OBJECT_STORAGE_TYPE: s3
        NEXT_PUBLIC_STORAGE_FIXED_QUOTA: ${STORAGE_FIXED_QUOTA}
        NEXT_PUBLIC_TRANSLATION_FIXED_QUOTA: ${TRANSLATION_FIXED_QUOTA}
    restart: unless-stopped
    ports:
      - "3000:3000"
#    to enable hot reload, mount the source code as a volume, and artifacts as anon volumes
#    volumes:
#      - ../:/app
#      - /app/node_modules
#      - /app/apps/readest-app/node_modules
#      - /app/apps/readest-app/public/vendor
#      - /app/apps/readest-app/.next
#      - /app/packages/foliate-js/node_modules
    environment:
      # better-auth + drizzle wiring (see apps/readest-app/.env.example)
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      DATABASE_URL: postgres://readest_app:readest_app@db:5432/${POSTGRES_DB}
      # MinIO / S3
      S3_ENDPOINT: http://${HOST_IP}:9000
      S3_REGION: us-east-1
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      # Mail (dev: Mailpit; prod: set RESEND_API_KEY)
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started

volumes:
  db-data:
  minio-data:
